# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# DevTools Configuration
spring.devtools.restart.enabled=true

# Server Configuration for Dockerfile
server.port=${PORT:8080}

# Datadog
management.datadog.metrics.export.enabled=true
management.datadog.metrics.export.uri=https://api.us5.datadoghq.com
# El secreto: los dos puntos al final permiten que la app arranque aunque la key no esté
management.datadog.metrics.export.api-key=${DD_API_KEY:}
management.datadog.metrics.export.step=30s
